<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{excerpt}}">
  <title>{{title}} | Chamisso-Grundschule</title>
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{excerpt}}">
  <meta property="og:image" content="{{image}}">
  <meta property="article:published_time" content="{{date}}">
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-post">
{{HEADER}}

  <main id="main" class="post-main">
    <article class="container post-article">
      <p class="post-meta"><a href="/aktuelles">← Alle Beiträge</a></p>
      <h1 class="post-title">{{title}}</h1>
      <p class="post-date"><time datetime="{{date}}">{{dateFormatted}}</time></p>
      {{imageBlock}}
      <div class="post-body">{{body}}</div>
    </article>
  </main>

{{FOOTER}}

  <script src="/js/i18n.js"></script>
  <script src="/js/content.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
