<!DOCTYPE html>
<html lang="de">
<head>
{{HEAD}}
</head>
<body class="page-kontakt">
{{HEADER}}

  <main id="main" class="page-main">
    <header class="page-hero">
      <div class="container">
        <p class="page-eyebrow">Kontakt</p>
        <h1 class="page-title">Sprechen Sie uns an</h1>
      </div>
    </header>

    <section class="contact section-pad">
      <div class="container">
        <div class="contact-grid">
          <aside class="contact-info">
            <h3>Sekretariat</h3>
            <ul class="contact-details">
              <li><span class="contact-icon" aria-hidden="true">📍</span>
                <span data-content="contact.address">Senftenberger Ring 27, 13435 Berlin</span></li>
              <li><span class="contact-icon" aria-hidden="true">📞</span>
                <a data-content="contact.phone" href="tel:+493021309370">030 / 213 093 70</a></li>
              <li><span class="contact-icon" aria-hidden="true">✉️</span>
                <a data-content="contact.email" href="mailto:info@chamisso.schule.berlin.de">info@chamisso.schule.berlin.de</a></li>
              <li><span class="contact-icon" aria-hidden="true">🕒</span>
                <span data-content="contact.hours">Mo–Fr 7:30–14:00 Uhr</span></li>
            </ul>
          </aside>

          <form id="contactForm" class="contact-form" novalidate>
            <div class="form-group">
              <label for="name">Name <span class="required" aria-hidden="true">*</span></label>
              <input id="name" name="name" type="text" required>
              <span id="nameError" class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="email">E-Mail <span class="required" aria-hidden="true">*</span></label>
              <input id="email" name="email" type="email" required>
              <span id="emailError" class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="subject">Betreff <span class="required" aria-hidden="true">*</span></label>
              <select id="subject" name="subject" required>
                <option value="">Bitte wählen</option>
              </select>
              <span id="subjectError" class="form-error" role="alert"></span>
            </div>
            <div class="form-group">
              <label for="message">Nachricht <span class="required" aria-hidden="true">*</span></label>
              <textarea id="message" name="message" rows="6" required></textarea>
              <span id="messageError" class="form-error" role="alert"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Nachricht per E-Mail senden</button>
            <p class="form-note">Beim Absenden öffnet sich Ihr E-Mail-Programm mit der vorausgefüllten Nachricht.</p>
          </form>
        </div>
      </div>
    </section>
  </main>

{{FOOTER}}

  <script>window.__PAGE_KEY = "/kontakt";</script>
  <script src="/js/i18n.js"></script>
  <script src="/js/content.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
